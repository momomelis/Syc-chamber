<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SYC Ritual Minimal Test</title>
<style>
  body {
    margin:0;
    background:#000;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    overflow:hidden;
    font-family: monospace;
  }
  #spiral {
    position:absolute;
    width:100%;
    height:100%;
    z-index:0;
  }
  #ritual {
    position:relative;
    z-index:1;
    background:#111;
    color:#FF2D95;
    border:2px solid #FF2D95;
    border-radius:50%;
    width:200px;
    height:200px;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,45,149,0.6);
  }
</style>
</head>
<body>
  <canvas id="spiral"></canvas>
  <button id="ritual">CLICK TO BEGIN</button>

<script>
const canvas = document.getElementById('spiral');
const ctx = canvas.getContext('2d');
let width, height;
function resize(){
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let clickCount = 0;
document.getElementById('ritual').addEventListener('click', ()=>{
  clickCount++;
});

function draw(){
  ctx.clearRect(0,0,width,height);
  ctx.strokeStyle = 'rgba(0,229,255,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const centerX = width/2, centerY = height/2;
  let a = 2; // growth rate
  let b = 0.20; // spiral tightness
  for(let t=0; t<clickCount*80; t++){
    let r = a * Math.exp(b*t/50);
    let x = centerX + r * Math.cos(t/20);
    let y = centerY + r * Math.sin(t/20);
    if(t===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
